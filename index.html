<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>信封贺卡</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #fdf6e9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
    }
    .envelope {
      width: 240px;
      height: 180px;
      background: #ffd7d7;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .envelope:hover {
      transform: scale(1.05);
    }
    .envelope::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      border-left: 120px solid transparent;
      border-right: 120px solid transparent;
      border-top: 90px solid #ffaaaa;
    }
    .tip {
      margin-top: 20px;
      color: #666;
    }
    .letter {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="envelope" onclick="openEnvelope()"></div>
  <p class="tip">点击信封，查收我的心意</p>

  <div class="letter">
    <h2>给你的一封信 💌</h2>
    <p>这里可以写你想对TA说的话~</p>
  </div>

  <script>
    function openEnvelope() {
      document.querySelector('.envelope').style.display = 'none';
      document.querySelector('.tip').style.display = 'none';
      document.querySelector('.letter').style.display = 'block';
    }
  </script>
</body>
</html>
